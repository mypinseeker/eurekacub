# Legacy workflow — content validation is now part of ci.yml.
# This file triggers only on content/-scoped PRs for fast feedback.
name: Content Validation

on:
  pull_request:
    paths:
      - 'content/**'

jobs:
  validate:
    name: Validate Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate-content
